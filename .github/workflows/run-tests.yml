name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  run-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.11"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,kwave,viz,autodiff]"

      - name: Lint with ruff
        run: ruff check beamax tests tools examples

      - name: Type-check with pyright
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python -m pip install pyright
          pyright

      - name: Test with pytest
        run: pytest --cov=beamax --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: main
          fail_ci_if_error: false

      - name: Run example smoke tests
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/mplconfig
        run: |
          mkdir -p "$MPLCONFIGDIR"
          python tools/run_examples.py --directory examples --include-optional --fail-fast --silent-figures
