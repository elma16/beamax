name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  run-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.11"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,kwave,viz]"

      - name: Lint with ruff
        run: ruff check src tests tools examples

      - name: Test with pytest
        run: pytest --cov=src/beamax --cov-report=term-missing -q

      - name: Run example smoke tests
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/mplconfig
        run: |
          mkdir -p "$MPLCONFIGDIR"
          python tools/run_examples.py --directory examples --fail-fast --silent-figures

  fno-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install with fno extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,fno]"
      - name: Run FNO smoke tests
        run: pytest -q tests/solvers/test_fno_solver.py
